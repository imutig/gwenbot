# Bot doesn't need special build, just npm
[phases.setup]
nixPkgs = [
	"nodejs"
]

aptPkgs = [
	"libglib2.0-0",
	"libnss3",
	"libnspr4",
	"libatk1.0-0",
	"libatk-bridge2.0-0",
	"libcups2",
	"libdbus-1-3",
	"libdrm2",
	"libxkbcommon0",
	"libxcomposite1",
	"libxdamage1",
	"libxfixes3",
	"libxrandr2",
	"libgbm1",
	"libasound2",
	"libx11-6",
	"libx11-xcb1",
	"libxcb1",
	"libxext6",
	"libxrender1",
	"libxi6",
	"libxtst6",
	"libxshmfence1",
	"libxinerama1",
	"libpango-1.0-0",
	"libcairo2"
]

[start]
cmd = "node index.js"
